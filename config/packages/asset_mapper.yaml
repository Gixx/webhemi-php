framework:
    asset_mapper:
        # The paths to make available to the asset mapper.
        paths:
            - assets/
        missing_import_mode: strict
        # Browsers reject ES modules served as text/html; .jsx is missing from Symfony's default map.
        extensions:
            jsx: text/javascript
            tsx: text/javascript
        excluded_patterns:
            - '*.d.ts'
            - '*/controllers.json'

when@prod:
    framework:
        asset_mapper:
            missing_import_mode: warn
